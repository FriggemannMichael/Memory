@if (open) {
  <div class="popup-backdrop" (click)="onBackdropClick($event)" role="dialog" aria-modal="true">
    <div class="popup-content">
      <h2 class="popup-title">Are you sure you want to quit the game?</h2>
      
      <div class="popup-buttons">
        <button type="button" class="popup-btn popup-btn--primary" (click)="onConfirm()">
          Exit game
        </button>
        <button type="button" class="popup-btn popup-btn--secondary" (click)="onCancel()">
          Continue
        </button>
      </div>
    </div>
  </div>
}
